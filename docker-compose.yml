version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: twitter-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yash2003
      MYSQL_DATABASE: twitter_db
    ports:
      - "3307:3306"
    networks:
      - app-network

  springboot-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/twitter_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: yash2003
    depends_on:
      - mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
